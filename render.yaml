# Render deploy config for the Atlas backend (FastAPI).
# The frontend is deployed separately on Vercel.
# Only the 4 `sync: false` values (real secrets) need entering in the Render
# dashboard — everything else is set here. CORS defaults to "*" in code until
# we tighten it to the Vercel URL after the frontend is live.
services:
  - type: web
    name: atlas-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DB_NAME
        value: atlas
      - key: APP_NAME
        value: life-admin
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: S3_REGION
        value: eu-west-1
      - key: S3_BUCKET
        value: atlas
      - key: S3_ENDPOINT_URL
        value: https://ryyxfhxhgakzamjmaywr.storage.supabase.co/storage/v1/s3
      # ---- enter these 4 secrets in the Render dashboard ----
      - key: MONGO_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
