# Render deploy config for the Atlas backend (FastAPI).
# The frontend is deployed separately on Vercel or Netlify.
# Secret / environment-specific vars are marked `sync: false` — set those
# by hand in the Render dashboard (Render won't read real secrets from git).
services:
  - type: web
    name: atlas-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DB_NAME
        value: atlas
      - key: APP_NAME
        value: life-admin
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: S3_REGION
        value: auto
      # ---- set these in the Render dashboard ----
      - key: MONGO_URL
        sync: false
      - key: CORS_ORIGINS          # e.g. https://your-frontend.vercel.app
        sync: false
      - key: PUBLIC_BACKEND_URL    # e.g. https://atlas-backend.onrender.com
        sync: false
      - key: PUBLIC_FRONTEND_URL   # e.g. https://your-frontend.vercel.app
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
